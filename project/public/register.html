<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Nexus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="nav-brand">Nexus</a>
    <ul class="nav-links" id="nav-dynamic"></ul>
  </nav>
  <main>
    <div class="form-container fade-in">
      <div class="form-header">
        <div class="eyebrow" style="justify-content:center;margin-bottom:1rem">New Account</div>
        <h2>Create Account</h2>
        <p>Register to access protected content</p>
      </div>
      <div class="card">
        <div id="alert" class="alert"></div>
        <form id="register-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Choose a username" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" required>
          </div>
          <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password" required>
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary btn-submit">Create Account</button>
        </form>
        <div class="form-footer">
          Already have an account? <a href="login.html">Sign in →</a>
        </div>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
