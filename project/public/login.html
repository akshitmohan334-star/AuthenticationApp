<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Nexus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="nav-brand">Nexus</a>
    <ul class="nav-links" id="nav-dynamic"></ul>
  </nav>
  <main>
    <div class="form-container fade-in">
      <div class="form-header">
        <div class="eyebrow" style="justify-content:center;margin-bottom:1rem">Authentication</div>
        <h2>Sign In</h2>
        <p>Enter your credentials to access your account</p>
      </div>
      <div class="card">
        <div id="alert" class="alert"></div>
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary btn-submit">Sign In</button>
        </form>
        <div class="form-footer">
          Don't have an account? <a href="register.html">Create one →</a>
        </div>
      </div>
      <div style="text-align:center;margin-top:1.5rem;font-size:0.72rem;color:var(--text-dim)">
        <p>Admin tip: register an account and manually set role to "admin" in MongoDB, or seed via the API.</p>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
